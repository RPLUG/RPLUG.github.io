    Professional Summary:
      - Ph.D. student in Chemical Engineering working on multi-GPU parallel computing, discrete element modelling, multiphysics coupling, and AI-assisted experiment-simulation integration. Developer of CUDA/MPI scientific software for large-scale complex-particle systems, with research spanning fundamental algorithms and industrial particulate processes.

    Research Interests:
      - Discrete element method (DEM) and GPU parallel computing
      - Non-spherical particles and multiphase-flow simulation
      - CFD-DEM coupling and multiscale particle-fluid modelling
      - AI-assisted particle identification, tracking, and parameter inference
      - Numerical modelling of industrial particulate processes

