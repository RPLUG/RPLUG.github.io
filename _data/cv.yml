cv:
  name: Jiayu Xu
  headline: Ph.D. Student | Particle Simulation, GPU Computing, and Scientific AI
  label: Ph.D. Student | Particle Simulation, GPU Computing, and Scientific AI
  location: Huairou, Beijing, China
  address:
    city: Huairou
    region: Beijing, China
  email: rplug_jyxu@icloud.com
  website: https://rplug.github.io
  summary: Ph.D. student in Chemical Engineering at the Institute of Process Engineering, Chinese Academy of Sciences, working on multi-GPU parallel computing, discrete element modelling, multiphysics coupling, and AI-assisted experiment-simulation integration. Developer of CUDA/MPI scientific software for large-scale complex-particle systems, with research spanning fundamental algorithms and industrial particulate processes. Participated in industrial research projects with China Coal, Baosteel, and Unilever.

  social_networks:
    - network: GitHub
      username: RPLUG
    - network: ResearchGate
      username: Jiayu-Xu-23

  sections:
    Academic Interests:
      - name: Particle simulation
        keywords:
          - discrete element method (DEM)
          - non-spherical particles
          - GPU parallel computing
      - name: Multiphase systems
        keywords:
          - CFD-DEM coupling
          - multiscale particle-fluid modelling
          - fluidized and fixed beds
      - name: Scientific AI
        keywords:
          - particle identification and tracking
          - DEM parameter inference
          - experiment-simulation integration
      - name: Industrial modelling
        keywords:
          - granular processing
          - particle conveying
          - process optimization

    Education:
      - institution: Institute of Process Engineering, Chinese Academy of Sciences
        area: Chemical Engineering
        degree: Ph.D. Student
        start_date: 2021-09
        end_date: present
        location: Beijing, China
        highlights:
          - University of Chinese Academy of Sciences
          - "GPA: 3.70/4.00"
          - "Advisors: Prof. Ji Xu and Prof. Wei Ge"
          - Research on DEM, GPU computing, non-spherical particles, multiphase-flow simulation, and AI-assisted particle analysis

      - institution: Xiangtan University
        area: Chemical Engineering and Technology
        degree: Bachelor of Engineering
        start_date: 2017-09
        end_date: 2021-06
        location: Xiangtan, China
        highlights:
          - School of Chemical Engineering
          - "GPA: 3.73/4.00"
          - "Advisor: Prof. Yefeng Zhou"
          - Research on CFD-DEM coupling, gas-solid fluidized beds, wet granular flows, and cohesive-particle modelling

    Experience:
      - company: Institute of Process Engineering, Chinese Academy of Sciences
        position: Large-Scale DEM and GPU-Accelerated Computing
        start_date: 2022-09
        end_date: present
        location: Beijing, China
        highlights:
          - Developed a CUDA/MPI-based multi-GPU DEM framework for concave and convex polyhedral particles
          - Enabled simulations of 20 million complex particles represented by approximately 12 billion triangular facets
          - Achieved near-linear weak scaling and over 80 percent strong-scaling efficiency on 16 NVIDIA RTX 4090 GPUs
          - Applied the framework to rotating drums, silo discharge, fixed beds, and particle packing

      - company: Institute of Process Engineering, Chinese Academy of Sciences
        position: Polyhedral-Particle CFD-DEM and Multiscale Gas-Solid Modelling
        start_date: 2025-01
        end_date: present
        location: Beijing, China
        highlights:
          - Developed a CPU-GPU heterogeneous coupling framework integrating OpenFOAM with a polyhedral-particle DEM solver
          - Investigated multiscale gas-solid methods including CG-DPM and MP-PIC
          - Targeted fluidized beds, fixed beds, and industrial particle-conveying systems

      - company: Institute of Process Engineering, Chinese Academy of Sciences
        position: AI-Assisted Particle Measurement and DEM Parameter Identification
        start_date: 2024-07
        end_date: 2026-02
        location: Beijing, China
        highlights:
          - Generated synthetic DEM datasets and trained Mask R-CNN models for irregular-particle image segmentation
          - Reconstructed particle trajectories and velocity fields from high-speed experimental images
          - Combined Vision Transformers, grid search, and CMA-ES optimization for rapid DEM contact-parameter identification

    Projects:
      - name: Rotary Storage Device for Blast Furnace Slag
        start_date: 2024-05
        end_date: 2026-05
        summary: Industrial research project with Baosteel (May 2024-May 2026)
        highlights:
          - Developed particle-flow models for a high-temperature rotary storage device
          - Evaluated feeding mode, storage volume, rotation speed, and lifter geometry
          - Supported uniform discharge and equipment optimization

      - name: DEM Simulation of Wet Granule Extrusion
        start_date: 2022-06
        end_date: 2024-08
        summary: Industrial research project with Unilever (June 2022-August 2024)
        highlights:
          - Developed wet-particle DEM models for basket-granulation extrusion
          - Investigated formulation, moisture content, extrusion force, and material flux
          - Supported formulation optimization and process scale-up

      - name: Quantitative Modelling of Blast Furnace Burden Distribution
        start_date: 2019-09
        end_date: 2021-11
        summary: Industrial research project with Baosteel (September 2019-November 2021)
        highlights:
          - Modelled blast-furnace charging and burden distribution
          - Analysed burden trajectory, surface profile, ore-to-coke ratio, and particle-size distribution
          - Supported charging-strategy optimization and coke-ratio reduction

